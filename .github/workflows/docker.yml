# Nom du pipeline
name: Build and Push to Docker Hub

# Déclencheur : à chaque push sur main
on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    # Tourne sur un serveur Ubuntu dans le Cloud
    runs-on: ubuntu-latest

    steps:
      # Étape 1 — Récupère le code depuis GitHub
      - name: Checkout code
        uses: actions/checkout@v3
        # But : Télécharger ton code
        #       sur le serveur Ubuntu

      # Étape 2 — Se connecte à Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          # But : Utilise les secrets GitHub
          #       pour s'authentifier
          #       sans exposer le mot de passe

      # Étape 3 — Build et push frontend
      - name: Build and push Frontend
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          push: true
          tags: oumaymaeddy/todo-frontend:latest
          # But : Construire l'image frontend
          #       et la pousser sur Docker Hub

      # Étape 4 — Build et push backend
      - name: Build and push Backend
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          push: true
          tags: oumaymaeddy/todo-backend:latest
          # But : Construire l'image backend
          #       et la pousser sur Docker Hub